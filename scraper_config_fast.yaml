# Sentiment analysis configuration
sentiment_analysis:
  enabled: true
  model_path: "models/lstm_sentiment_model"
  confidence_threshold: 0.6
  
# Monitoring and alerting
monitoring:
  enable_prometheus: true
  enable_health_checks: true
  health_check_interval: 30
  
  # Alert thresholds
  alerts:
    low_success_rate_threshold: 0.1  # 10%
    high_error_rate_threshold: 0.2   # 20%
    circuit_breaker_open_threshold: 3
    
# Logging configuration
logging:
  level: "INFO"
  format: "json"
  file: "scraper.log"
  max_size: "100MB"
  backup_count: 5



