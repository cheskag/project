# Content filtering rules
content_filters:
  min_title_length: 10
  min_content_length: 50
  max_content_length: 50000
  
  # Keywords to exclude
  exclude_keywords:
    - "press release"
    - "sponsored"
    - "advertisement"
    - "promotion"
    - "partnership announcement"
    - "paid content"
  
  # URL patterns to exclude
  exclude_url_patterns:
    - "/about"
    - "/privacy"
    - "/terms"
    - "/cookies"
    - "/newsletter"
